services:
  - type: web
    name: taxassist-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -b 0.0.0.0:8000 fastapi.app:app"
    envVars:
      - key: DATABASE_URL
        scope: secret
      - key: GROQ_API_KEY
        scope: secret
      - key: SECRET_KEY
        scope: secret
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    rootDir: .

  - type: web
    name: taxassist-frontend
    runtime: node
    buildCommand: "cd taxeaseui && npm ci && npm run build"
    startCommand: "cd taxeaseui && npm start"
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://taxassist-backend.onrender.com
    rootDir: .
