services:
  - type: web
    name: taxassist-backend
    runtime: python
    pythonVersion: 3.14
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:8000 fastapi.app:app"
    workingDirectory: ./backend
    envVars:
      - key: DATABASE_URL
        scope: secret
      - key: GROQ_API_KEY
        scope: secret
      - key: SECRET_KEY
        scope: secret
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    healthCheckInterval: 30
    port: 8000

  - type: web
    name: taxassist-frontend
    runtime: node
    nodeVersion: 18
    buildCommand: "npm ci && npm run build"
    startCommand: "npm start"
    workingDirectory: ./taxeaseui
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        scope: env_specific
        preview:
          value: https://taxassist-backend.onrender.com
        production:
          value: https://taxassist-backend.onrender.com
    port: 3000

databases:
  - name: taxassist-db
    databaseName: taxassist
    user: taxassist
    plan: free
    version: 15
    region: oregon
